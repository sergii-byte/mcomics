        body { font-family: 'Open Sans', sans-serif; background: var(--blue-dark); min-height: 100vh; display: flex; flex-direction: column; }

        .lang-switch { display: flex; gap: 3px; align-items: center; }
        .lang-switch a { text-decoration: none; transition: transform 0.2s, opacity 0.3s; opacity: 0.5; line-height: 1; display: flex; align-items: center; }
        .lang-switch a:hover { opacity: 1; transform: scale(1.15); }
        .lang-switch a.active { opacity: 1; }
        .lang-switch img { width: 18px; height: 14px; }
        .splash { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; position: relative; z-index: 1; }
        .splash-box { border: 4px solid var(--black); box-shadow: 8px 8px 0 var(--black); border-radius: 12px; padding: 60px 50px; text-align: center; max-width: 500px; width: 100%; }

        .splash-message { font-size: 1.1rem; color: rgba(255,255,255,0.9); line-height: 1.6; margin-bottom: 10px; font-weight: 700; }
